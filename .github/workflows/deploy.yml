name: Deploy to GitHub Pages

on:
  # Publica en cada push a main
  push:
    branches: [main]
  # Permite lanzarlo manualmente desde la pestaña Actions
  workflow_dispatch:

# Permisos que necesita el despliegue en Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo despliegue a la vez; no cancela un despliegue en curso
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Habilita GitHub Pages automáticamente en la primera ejecución
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
